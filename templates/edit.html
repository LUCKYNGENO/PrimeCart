{% extends 'base.html' %}

{% block title %}Edit Product{% endblock %}

{% block content %}

<div class="admin-container">

    <h1>Edit Product</h1>

    <form action="/update/{{ product[0] }}" method="POST">

        <input
            type="text"
            name="name"
            value="{{ product[1] }}"
            required
        >

        <input
            type="text"
            name="category"
            value="{{ product[2] }}"
            required
        >

        <input
            type="number"
            step="0.01"
            name="price"
            value="{{ product[3] }}"
            required
        >

        <input
            type="text"
            name="affiliate_link"
            value="{{ product[5] }}"
            required
        >

        <textarea
            name="description"
            rows="5"
        >{{ product[6] }}</textarea>

        <button type="submit">
            Update Product
        </button>

    </form>

</div>

{% endblock %}
