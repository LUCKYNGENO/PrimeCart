{% extends 'base.html' %}

{% block title %}Admin Login{% endblock %}

{% block content %}

<div class="admin-container">

    <h1>Admin Login</h1>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

    <form action="/login" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

{% endblock %}
